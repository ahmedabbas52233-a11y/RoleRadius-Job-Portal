name: RoleRadius CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Django Tests + Security Scan (Python 3.12)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roleradius_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install setuptools
          pip install -r requirements.txt

      - name: Security scan — pip-audit
        run: |
          cd backend
          pip install pip-audit
          pip-audit --desc || true  # warn but don't fail CI on advisories

      - name: Run Django system check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roleradius_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py check --deploy 2>&1 | grep -v "WARNINGS" || true
          python manage.py check

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roleradius_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only
          DEBUG: 'True'
          EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
          PYTHONUTF8: '1'
        run: |
          cd backend
          python manage.py test --verbosity=2 --failfast

      - name: Check for missing migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roleradius_test
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only
          DEBUG: 'True'
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

  frontend:
    name: Frontend Build + Lint (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Security audit
        run: cd frontend && npm audit --audit-level=high || true

      - name: Build production bundle
        env:
          VITE_API_URL: /api
        run: cd frontend && npm run build

  docker:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker images
        run: docker compose build --no-cache
