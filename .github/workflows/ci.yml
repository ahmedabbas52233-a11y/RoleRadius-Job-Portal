name: RoleRadius CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Django backend tests ────────────────────────────────────────────────────
  backend:
    name: Django Tests (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       roleradius_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install setuptools
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL:  postgresql://postgres:postgres@localhost:5432/roleradius_test
          SECRET_KEY:    ci-test-secret-key-not-for-production
          DEBUG:         'True'
          EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
        run: |
          cd backend
          python manage.py test --verbosity=2 --failfast

      - name: Check for missing migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roleradius_test
          SECRET_KEY:   ci-test-secret-key-not-for-production
          DEBUG:        'True'
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

  # ── React frontend build check ──────────────────────────────────────────────
  frontend:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: /api
        run: |
          cd frontend
          npm run build
