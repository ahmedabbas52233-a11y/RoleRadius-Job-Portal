version: '3.9'

services:
  # ── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       roleradius_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             gunicorn roleradius.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
    ports:
      - '8000:8000'
    environment:
      DEBUG:               'True'
      SECRET_KEY:          'docker-dev-secret-key-change-in-production'
      DATABASE_URL:        'postgresql://postgres:postgres@db:5432/roleradius_db'
      ALLOWED_HOSTS:       'localhost,127.0.0.1,backend'
      CORS_ALLOWED_ORIGINS: 'http://localhost:5173,http://localhost:3000'
      FRONTEND_URL:        'http://localhost:5173'
      EMAIL_BACKEND:       'django.core.mail.backends.console.EmailBackend'
      CLOUDINARY_CLOUD_NAME: ''
      CLOUDINARY_API_KEY:    ''
      CLOUDINARY_API_SECRET: ''
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: 'http://localhost:8000/api'
    volumes:
      - ./frontend/src:/app/src        # hot reload in dev
      - /app/node_modules              # don't overwrite container's node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  static_files:
